apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-a100-n256-g4-

spec:
  completions: 1
  backoffLimit: 0
  ttlSecondsAfterFinished: 180
  template:
    metadata:
      name: awave-pod
      labels:
        kueue.x-k8s.io/max-exec-time-seconds: "300"
        kueue.x-k8s.io/queue-name: eidf018ns-profiling-queue

    spec:
      activeDeadlineSeconds: 300
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 16Gi }
      containers:
        - name: run
          image: $container
          resources:
            requests: { cpu: 8, memory: 120Gi, nvidia.com/gpu: 4 }
            limits:   { cpu: 8, memory: 120Gi, nvidia.com/gpu: 4 }
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
          command: ["bash", "-c"]
          args:
            - |-
              set -euo pipefail
              cd ${KGPU_SUBMIT_DIR}
              mkdir -p results/a100
              mpirun -n 4 -mca coll ^hcoll build-CUDA/awave -shape 256,256,256 -mpi 2,2,1 -nsteps 100 -out_period 100 -skip_cpu 1 -json results/a100/n256_g4.json ${KGPU_JOB_NAME} 2>&1 | tee results/a100/n256_g4.log
