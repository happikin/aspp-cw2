apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-h100-n2500-g4-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 1800
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "${KGPU_SUBMIT_DIR}/${KGPU_JOB_NAME}.log") 2>&1
            set -e
            mkdir -p "${KGPU_SUBMIT_DIR}/results/h100/g4"
            echo "=== shape 2500^3 on 4 GPUs (H100) ==="
            mpirun -np 4 -mca coll ^hcoll               "${KGPU_SUBMIT_DIR}/build-CUDA/awave"               -mpi 2,2,1 -shape 2500,2500,2500 -nsteps 100 -out_period 100 -skip_cpu 1               -json "${KGPU_SUBMIT_DIR}/results/h100/g4/n2500_g4.json"               "${KGPU_JOB_NAME}"
        resources:
          requests:
            cpu: 8
            memory: 128Gi
            nvidia.com/gpu: 4
          limits:
            cpu: 8
            memory: 128Gi
            nvidia.com/gpu: 4
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
