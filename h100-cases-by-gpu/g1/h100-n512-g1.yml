apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-h100-n512-g1-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 1800
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "${KGPU_SUBMIT_DIR}/${KGPU_JOB_NAME}.log") 2>&1
            set -e
            mkdir -p "${KGPU_SUBMIT_DIR}/results/h100/g1"
            echo "=== shape 512^3 on 1 GPUs (H100) ==="
            mpirun -np 1 -mca coll ^hcoll               "${KGPU_SUBMIT_DIR}/build-CUDA/awave"               -mpi 1,1,1 -shape 512,512,512 -nsteps 100 -out_period 100 -skip_cpu 1               -json "${KGPU_SUBMIT_DIR}/results/h100/g1/n512_g1.json"               "${KGPU_JOB_NAME}"
        resources:
          requests:
            cpu: 4
            memory: 32Gi
            nvidia.com/gpu: 1
          limits:
            cpu: 4
            memory: 32Gi
            nvidia.com/gpu: 1
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
