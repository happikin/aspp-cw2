apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-h100-n1024-g2-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 1800
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "${KGPU_SUBMIT_DIR}/${KGPU_JOB_NAME}.log") 2>&1
            set -e
            mkdir -p "${KGPU_SUBMIT_DIR}/results/h100/g2"
            echo "=== shape 1024^3 on 2 GPUs (H100) ==="
            mpirun -np 2 -mca coll ^hcoll               "${KGPU_SUBMIT_DIR}/build-CUDA/awave"               -mpi 2,1,1 -shape 1024,1024,1024 -nsteps 100 -out_period 100 -skip_cpu 1               -json "${KGPU_SUBMIT_DIR}/results/h100/g2/n1024_g2.json"               "${KGPU_JOB_NAME}"
        resources:
          requests:
            cpu: 8
            memory: 64Gi
            nvidia.com/gpu: 2
          limits:
            cpu: 8
            memory: 64Gi
            nvidia.com/gpu: 2
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
