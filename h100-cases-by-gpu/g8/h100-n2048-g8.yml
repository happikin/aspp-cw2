apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-h100-n2048-g8-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 1800
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "${KGPU_SUBMIT_DIR}/${KGPU_JOB_NAME}.log") 2>&1
            set -e
            mkdir -p "${KGPU_SUBMIT_DIR}/results/h100/g8"
            echo "=== shape 2048^3 on 8 GPUs (H100) ==="
            mpirun -np 8 -mca coll ^hcoll               "${KGPU_SUBMIT_DIR}/build-CUDA/awave"               -mpi 2,2,2 -shape 2048,2048,2048 -nsteps 100 -out_period 100 -skip_cpu 1               -json "${KGPU_SUBMIT_DIR}/results/h100/g8/n2048_g8.json"               "${KGPU_JOB_NAME}"
        resources:
          requests:
            cpu: 16
            memory: 180Gi
            nvidia.com/gpu: 8
          limits:
            cpu: 16
            memory: 180Gi
            nvidia.com/gpu: 8
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
