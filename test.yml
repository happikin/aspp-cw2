apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 900
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 3200
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "$(KGPU_SUBMIT_DIR)/$(KGPU_JOB_NAME).log") 2>&1
            set -e
            echo "=== shape 1024^3 on 4 GPUs ==="
            mpirun -np 8 -mca coll ^hcoll \
              "$(KGPU_SUBMIT_DIR)/build-CUDA/awave" \
              -mpi 2,2,2 -shape 128,128,128 \
              "$(KGPU_JOB_NAME)" \
            && nvidia-smi
        resources:
          requests:
            cpu: 8
            memory: 64Gi
            nvidia.com/gpu: 8
          limits:
            cpu: 8
            memory: 64Gi
            nvidia.com/gpu: 8
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
