apiVersion: batch/v1
kind: Job
metadata:
  generateName: awave-
spec:
  completions: 1
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      name: awave-pod
    spec:
      activeDeadlineSeconds: 1800
      containers:
      - name: run
        image: $container
        command:
          - bash
          - -c
          - |
            exec > >(tee "$(KGPU_SUBMIT_DIR)/$(KGPU_JOB_NAME).log") 2>&1
            set -e
            echo "=== shape 1024^3 on 4 GPUs ==="
            mpirun -np 4 -mca coll ^hcoll \
              "$(KGPU_SUBMIT_DIR)/build-CUDA/awave" \
              -mpi 2,2,1 -shape 512,512,512 \
              -json "$(KGPU_SUBMIT_DIR)/$(KGPU_JOB_NAME).json" \
              "$(KGPU_JOB_NAME)"
        resources:
          requests:
            cpu: 8
            memory: 128Gi
            nvidia.com/gpu: 4
          limits:
            cpu: 8
            memory: 128Gi
            nvidia.com/gpu: 4
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB